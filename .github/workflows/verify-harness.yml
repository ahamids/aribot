name: verify-harness

on:
  pull_request:
    branches:
      - testnet
      - mainnet
  push:
    branches:
      - testnet
      - mainnet

jobs:
  verify:
    name: verify_bot_v2 harness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ccxt

      - name: Run verify harness (USDT strict)
        run: |
          python verify_bot_v2.py --market usdt --strict
