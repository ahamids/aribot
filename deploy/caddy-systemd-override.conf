[Service]
# The apt-installed caddy.service does NOT load /etc/default/caddy by
# default, so {$SITE_ADDRESS} and {$EMAIL} in /etc/caddy/Caddyfile
# resolve to empty strings and the reload fails. This drop-in adds the
# missing EnvironmentFile so Caddy can substitute the env vars set in
# deploy/README.md Phase 3.
#
# Install at: /etc/systemd/system/caddy.service.d/override.conf
# Then:       systemctl daemon-reload && systemctl restart caddy
EnvironmentFile=/etc/default/caddy
