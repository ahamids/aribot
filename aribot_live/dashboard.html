<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARIBOT LIVE Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.3/chart.umd.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f2f6fa;
      --bg-grad-a: #e8eff8;
      --bg-grad-b: #f7f9fc;
      --surface: #ffffff;
      --surface-2: #f4f7fb;
      --text: #17212b;
      --text-soft: #5a6876;
      --border: #d7e0ea;
      --accent: #005f73;
      --accent-2: #0a9396;
      --good: #1b8f4f;
      --bad: #c13d3d;
      --warn: #b78103;
      --info: #2161a6;
      --shadow: 0 10px 30px rgba(18, 33, 52, 0.08);
      --badge-muted: #6d7785;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #12171f;
        --bg-grad-a: #1a2330;
        --bg-grad-b: #0f141b;
        --surface: #1a222d;
        --surface-2: #202b39;
        --text: #e8edf3;
        --text-soft: #a4b0be;
        --border: #324355;
        --accent: #5fb9c8;
        --accent-2: #7ad4c9;
        --good: #5fd08d;
        --bad: #ff7f7f;
        --warn: #ffd166;
        --info: #7bb5ff;
        --shadow: 0 12px 34px rgba(0, 0, 0, 0.35);
        --badge-muted: #a6b2bf;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", "Trebuchet MS", "Noto Sans", sans-serif;
      background:
        radial-gradient(1200px 600px at 10% -20%, var(--bg-grad-a), transparent),
        radial-gradient(1000px 500px at 90% -40%, var(--bg-grad-b), transparent),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app-shell {
      max-width: 1440px;
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tab-btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .tab-btn.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-color: transparent;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 14px;
      margin-bottom: 14px;
    }

    .metrics-row {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      min-height: 68px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric-label {
      color: var(--text-soft);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .metric-value {
      font-size: 1rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .span-2 { grid-column: span 2; }
    .span-3 { grid-column: span 3; }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      border: 1px solid transparent;
    }

    .badge.mode-live { background: #1b8f4f; color: #fff; border-color: #1b8f4f; }
    .badge.mode-paper { background: #6d7785; color: #fff; border-color: #6d7785; }
    .badge.mode-shadow { background: #b78103; color: #fff; border-color: #b78103; }
    .badge.mode-unknown { background: rgba(109, 119, 133, 0.2); color: var(--badge-muted); border-color: rgba(109, 119, 133, 0.35); }
    .badge.good { background: rgba(27, 143, 79, 0.15); color: var(--good); border-color: rgba(27, 143, 79, 0.35); }
    .badge.bad { background: rgba(193, 61, 61, 0.15); color: var(--bad); border-color: rgba(193, 61, 61, 0.35); }
    .badge.warn { background: rgba(183, 129, 3, 0.2); color: var(--warn); border-color: rgba(183, 129, 3, 0.35); }
    .badge.info { background: rgba(33, 97, 166, 0.15); color: var(--info); border-color: rgba(33, 97, 166, 0.35); }

    .split {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 14px;
    }

    .chart-wrap {
      height: 240px;
      position: relative;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .positions-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    @media (min-width: 1280px) {
      .positions-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 1024px) {
      .app-shell { padding: 12px; }
      .split { grid-template-columns: 1fr; }
      .positions-grid { grid-template-columns: 1fr; }
      .metrics-row { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .span-2, .span-3 { grid-column: span 1; }
    }

    .pos-card {
      border: 1px solid var(--border);
      background: var(--surface-2);
      border-radius: 12px;
      padding: 12px;
    }

    .pos-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .symbol {
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    .row-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 12px;
      font-size: 0.86rem;
    }

    .row-item {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px dashed var(--border);
      padding-bottom: 4px;
    }

    .row-item .k { color: var(--text-soft); }
    .row-item .v { font-weight: 600; text-align: right; }

    .btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 12px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
      border-color: transparent;
    }

    .btn.danger {
      background: rgba(193, 61, 61, 0.12);
      border-color: rgba(193, 61, 61, 0.4);
      color: var(--bad);
    }

    .btn.warning {
      background: rgba(183, 129, 3, 0.16);
      border-color: rgba(183, 129, 3, 0.35);
      color: var(--warn);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 840px;
    }

    th, td {
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 0.86rem;
      white-space: nowrap;
    }

    th {
      color: var(--text-soft);
      font-weight: 700;
      background: var(--surface-2);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .collapsible-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      margin-bottom: 10px;
    }

    .events {
      max-height: 260px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-2);
      font-family: Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.8rem;
      padding: 8px;
    }

    .event-line {
      display: grid;
      grid-template-columns: 140px 80px 1fr;
      gap: 8px;
      padding: 3px 2px;
      border-bottom: 1px dotted var(--border);
    }

    .lvl-debug { color: var(--badge-muted); }
    .lvl-info { color: var(--info); }
    .lvl-warning { color: var(--warn); }
    .lvl-error, .lvl-critical { color: var(--bad); }

    .hint {
      color: var(--text-soft);
      font-size: 0.82rem;
    }

    .error-banner {
      border: 1px solid rgba(193, 61, 61, 0.4);
      background: rgba(193, 61, 61, 0.12);
      color: var(--bad);
      border-radius: 10px;
      padding: 9px 12px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .pending {
      border: 1px solid rgba(183, 129, 3, 0.4);
      background: rgba(183, 129, 3, 0.12);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 12px;
    }

    .control-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 1024px) {
      .control-grid { grid-template-columns: 1fr; }
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-2);
      padding: 10px;
      margin-bottom: 8px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    @media (max-width: 1024px) {
      .field-grid { grid-template-columns: 1fr; }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .field label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-soft);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .field input,
    .field textarea,
    .field select {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      font: inherit;
    }

    .field textarea {
      min-height: 210px;
      resize: vertical;
      font-family: Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.8rem;
    }

    .group-block {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      background: var(--surface-2);
      margin-bottom: 10px;
    }

    .group-title {
      margin: 0 0 8px;
      font-size: 0.9rem;
    }

    .unsaved {
      border: 1px solid rgba(183, 129, 3, 0.5);
      background: rgba(183, 129, 3, 0.16);
      border-radius: 10px;
      padding: 9px 12px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 14px;
    }

    .modal {
      width: min(560px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .footer-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .empty {
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      color: var(--text-soft);
      background: var(--surface-2);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import React, { useEffect, useMemo, useRef, useState } from "https://esm.sh/react@18.2.0";
    import { createRoot } from "https://esm.sh/react-dom@18.2.0/client";

    const h = React.createElement;
    const POLL_MS = 5000;
    const ERROR_TEXT = "Connection error \u2014 retrying";

    function cls() {
      return Array.from(arguments).filter(Boolean).join(" ");
    }

    function fmtMoney(v) {
      if (v === null || v === undefined || Number.isNaN(Number(v))) return "-";
      return new Intl.NumberFormat(undefined, { style: "currency", currency: "USD", maximumFractionDigits: 2 }).format(Number(v));
    }

    function fmtNum(v, d = 2) {
      if (v === null || v === undefined || Number.isNaN(Number(v))) return "-";
      return Number(v).toFixed(d);
    }

    function fmtPct(v, d = 2) {
      if (v === null || v === undefined || Number.isNaN(Number(v))) return "-";
      const n = Number(v);
      return `${n >= 0 ? "+" : ""}${n.toFixed(d)}%`;
    }

    function iso(v) {
      if (!v) return "-";
      const d = new Date(v);
      return Number.isNaN(d.getTime()) ? String(v) : d.toLocaleString();
    }

    function parseJson(text) {
      try {
        return { ok: true, value: JSON.parse(text), error: "" };
      } catch (err) {
        return { ok: false, value: null, error: err instanceof Error ? err.message : "Invalid JSON" };
      }
    }

    function levelClass(level) {
      const l = String(level || "info").toLowerCase();
      if (l.includes("critical")) return "lvl-critical";
      if (l.includes("error")) return "lvl-error";
      if (l.includes("warn")) return "lvl-warning";
      if (l.includes("debug")) return "lvl-debug";
      return "lvl-info";
    }

    function eventText(e) {
      if (!e || typeof e !== "object") return "";
      return String(e.message || e.msg || e.event || e.reason || JSON.stringify(e));
    }

    async function fetchJson(path) {
      const res = await fetch(path, { headers: { "Accept": "application/json" } });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function stableSortObject(obj) {
      if (Array.isArray(obj)) return obj.map(stableSortObject);
      if (obj && typeof obj === "object") {
        const out = {};
        Object.keys(obj).sort().forEach((k) => {
          out[k] = stableSortObject(obj[k]);
        });
        return out;
      }
      return obj;
    }

    function isEqualJson(a, b) {
      return JSON.stringify(stableSortObject(a)) === JSON.stringify(stableSortObject(b));
    }

    function ModeBadge({ mode }) {
      const m = String(mode || "unknown").toLowerCase();
      const kind = m.includes("live") ? "live" : m.includes("shadow") ? "shadow" : m.includes("paper") ? "paper" : "unknown";
      return h("span", { className: cls("badge", `mode-${kind}`) }, (mode || "UNKNOWN").toUpperCase());
    }

    function EquityChart({ points, startBalance }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current || typeof Chart === "undefined") return;
        const labels = points.map((p, i) => p.close_time || `T${i + 1}`);
        const equitySeries = points.map((p) => Number(p.equity || 0));
        const lineValue = Number(startBalance || 0);
        const baseline = labels.map(() => lineValue);

        if (chartRef.current) {
          chartRef.current.destroy();
          chartRef.current = null;
        }

        chartRef.current = new Chart(canvasRef.current, {
          type: "line",
          data: {
            labels,
            datasets: [
              {
                label: "Equity",
                data: equitySeries,
                borderColor: "#0a9396",
                backgroundColor: "rgba(10,147,150,0.15)",
                tension: 0.28,
                pointRadius: 0,
                borderWidth: 2,
                fill: true,
              },
              {
                label: "Session Start",
                data: baseline,
                borderColor: "#b78103",
                borderDash: [7, 5],
                pointRadius: 0,
                borderWidth: 1.5,
                fill: false,
              },
            ],
          },
          options: {
            maintainAspectRatio: false,
            interaction: { mode: "index", intersect: false },
            plugins: {
              legend: { display: true, labels: { boxWidth: 10 } },
              tooltip: {
                callbacks: {
                  afterBody(items) {
                    if (!items || !items.length) return "";
                    const idx = items[0].dataIndex;
                    const eq = equitySeries[idx] || 0;
                    const delta = eq - lineValue;
                    return `Delta vs start: ${delta >= 0 ? "+" : ""}${fmtMoney(delta)}`;
                  },
                },
              },
            },
            scales: {
              x: { ticks: { maxTicksLimit: 6 } },
              y: { ticks: { callback: (v) => fmtMoney(v) } },
            },
          },
        });

        return () => {
          if (chartRef.current) {
            chartRef.current.destroy();
            chartRef.current = null;
          }
        };
      }, [points, startBalance]);

      if (!points.length) {
        return h("div", { className: "empty" }, "No equity points yet. Equity appears after closed trades are recorded.");
      }

      return h("div", { className: "chart-wrap" }, h("canvas", { ref: canvasRef }));
    }

    function Modal({ title, children, actions, onClose }) {
      return h(
        "div",
        {
          className: "modal-backdrop",
          onClick: (e) => {
            if (e.target === e.currentTarget) onClose();
          },
        },
        h("div", { className: "modal", role: "dialog", "aria-modal": "true" }, [
          h("h3", { key: "t", style: { marginTop: 0 } }, title),
          h("div", { key: "c" }, children),
          h("div", { key: "a", className: "modal-actions" }, actions),
        ])
      );
    }

    function App() {
      const [tab, setTab] = useState("dashboard");
      const [status, setStatus] = useState(null);
      const [positions, setPositions] = useState([]);
      const [trades, setTrades] = useState([]);
      const [events, setEvents] = useState([]);
      const [equity, setEquity] = useState({ initial_balance: 0, current_balance: 0, points: [] });
      const [tradesLimit, setTradesLimit] = useState(50);
      const [eventsCollapsed, setEventsCollapsed] = useState(false);
      const [connectionError, setConnectionError] = useState(false);
      const [lastUpdatedAt, setLastUpdatedAt] = useState(0);
      const [secondsSinceUpdate, setSecondsSinceUpdate] = useState(0);
      const [actionBusy, setActionBusy] = useState(false);
      const [pendingAction, setPendingAction] = useState(null);
      const [pendingSeconds, setPendingSeconds] = useState(0);

      const [showCloseAllModal, setShowCloseAllModal] = useState(false);
      const [closeSymbolTarget, setCloseSymbolTarget] = useState(null);
      const [showKillStepOne, setShowKillStepOne] = useState(false);
      const [showKillStepTwo, setShowKillStepTwo] = useState(false);
      const [killInput, setKillInput] = useState("");

      const [settingsLoaded, setSettingsLoaded] = useState(false);
      const [settingsLoading, setSettingsLoading] = useState(false);
      const [settingsSaving, setSettingsSaving] = useState(false);
      const [settingsError, setSettingsError] = useState("");
      const [settingsInfo, setSettingsInfo] = useState("");
      const [settingsBaseline, setSettingsBaseline] = useState({ env: {}, leverage: {}, files: {} });
      const [envState, setEnvState] = useState({});
      const [leverageObj, setLeverageObj] = useState({});
      const [leverageJson, setLeverageJson] = useState("{}");
      const [leverageError, setLeverageError] = useState("");

      const eventsRef = useRef(null);

      const drawdown = useMemo(() => {
        const pts = equity.points || [];
        if (!pts.length) return 0;
        let peak = Number(pts[0].equity || 0);
        let maxDd = 0;
        for (const p of pts) {
          const v = Number(p.equity || 0);
          if (v > peak) peak = v;
          const dd = peak > 0 ? ((peak - v) / peak) * 100 : 0;
          if (dd > maxDd) maxDd = dd;
        }
        return maxDd;
      }, [equity]);

      const winRate = useMemo(() => {
        const w = Number(status?.winning_trades || 0);
        const l = Number(status?.losing_trades || 0);
        const t = w + l;
        return t ? (w / t) * 100 : null;
      }, [status]);

      const cooldownActive = useMemo(() => {
        if (!status?.cooldown_until_utc) return false;
        const t = new Date(status.cooldown_until_utc).getTime();
        if (Number.isNaN(t)) return false;
        return t > Date.now();
      }, [status]);

      const circuitBadges = useMemo(() => {
        return [
          { label: "MANUAL PAUSE", active: !!status?.manual_entry_paused, type: "warn" },
          { label: "DAILY HALT", active: !!status?.daily_drawdown_paused, type: "bad" },
          { label: status?.cooldown_until_utc ? `COOLDOWN ${iso(status.cooldown_until_utc)}` : "COOLDOWN", active: cooldownActive, type: "info" },
        ];
      }, [status, cooldownActive]);

      const leverageValid = leverageError === "";

      const settingsDirty = useMemo(() => {
        if (!settingsLoaded) return false;
        const envDirty = !isEqualJson(envState, settingsBaseline.env);
        const levDirty = !isEqualJson(leverageObj, settingsBaseline.leverage);
        return envDirty || levDirty;
      }, [envState, leverageObj, settingsBaseline, settingsLoaded]);

      const canSave = settingsLoaded && settingsDirty && leverageValid && !settingsSaving;
      const canSaveRestart = canSave && String(envState.RESTART_COMMAND || "").trim().length > 0;

      function derivePendingFromStatus(s) {
        if (!s || typeof s !== "object") return null;
        const raw = s.telegram_pending_confirmations_json;
        if (typeof raw !== "string" || !raw.trim()) return null;
        const parsed = parseJson(raw);
        if (!parsed.ok || !parsed.value || typeof parsed.value !== "object") return null;
        return parsed.value;
      }

      async function pollDashboard() {
        const requests = [
          fetchJson("/api/status"),
          fetchJson("/api/positions"),
          fetchJson(`/api/trades?limit=${tradesLimit}`),
          fetchJson("/api/equity"),
          fetchJson("/api/events?limit=200"),
        ];

        const result = await Promise.allSettled(requests);

        const okStatus = result[0].status === "fulfilled";
        const okPositions = result[1].status === "fulfilled";
        const okTrades = result[2].status === "fulfilled";
        const okEquity = result[3].status === "fulfilled";
        const okEvents = result[4].status === "fulfilled";

        if (okStatus) {
          const s = result[0].value;
          setStatus(s);
          const derivedPending = derivePendingFromStatus(s);
          if (derivedPending) setPendingAction(derivedPending);
        }
        if (okPositions) setPositions(Array.isArray(result[1].value) ? result[1].value : []);
        if (okTrades) setTrades(Array.isArray(result[2].value) ? result[2].value : []);
        if (okEquity) {
          const eqRaw = result[3].value;
          if (Array.isArray(eqRaw)) {
            const points = eqRaw.map((p, i) => ({ close_time: p.timestamp || `T${i + 1}`, equity: Number(p.balance || 0) }));
            const current = points.length ? Number(points[points.length - 1].equity || 0) : Number(status?.session_start_balance || 0);
            setEquity({ initial_balance: Number(status?.session_start_balance || 0), current_balance: current, points });
          } else {
            setEquity(eqRaw || { initial_balance: 0, current_balance: 0, points: [] });
          }
        }
        if (okEvents) setEvents(Array.isArray(result[4].value) ? result[4].value : []);

        const failed = !okStatus || !okPositions || !okTrades || !okEquity || !okEvents;
        setConnectionError(failed);
        if (!failed) {
          const now = Date.now();
          setLastUpdatedAt(now);
          setSecondsSinceUpdate(0);
        }
      }

        const [s, p] = await Promise.all([fetchJson("/api/status"), fetchJson("/api/positions")]);
        setStatus(s);
        setPositions(Array.isArray(p) ? p : []);
        const pending = derivePendingFromStatus(s);
        if (pending) setPendingAction(pending);
      }

        setSettingsLoading(true);
        setSettingsError("");
        try {
          const data = await fetchJson("/api/settings");
          const env = data?.env && typeof data.env === "object" ? data.env : {};
          const leverage = data?.leverage_buckets && typeof data.leverage_buckets === "object" ? data.leverage_buckets : (data?.leverage && typeof data.leverage === "object" ? data.leverage : {});
          const baseline = { env, leverage, files: data?.files || {} };
          setSettingsBaseline(baseline);
          setEnvState(env);
          setLeverageObj(leverage);
          setLeverageJson(JSON.stringify(leverage, null, 2));
          setLeverageError("");
          setSettingsLoaded(true);
        } catch (err) {
          setSettingsError(err instanceof Error ? err.message : "Failed to load settings");
        } finally {
          setSettingsLoading(false);
        }
      }

      async function doControl(action, symbol) {
        setActionBusy(true);
        try {
          const body = { action };
          if (symbol) body.symbol = symbol;
          const res = await fetch("/api/control", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          if (!res.ok) {
            throw new Error(`Control failed: HTTP ${res.status}`);
          }
          const data = await res.json();
          if (data.pending) setPendingAction(data.pending);
          await refreshControlSnapshot();
        } catch (err) {
          alert(err instanceof Error ? err.message : "Control action failed");
        } finally {
          setActionBusy(false);
        }
      }

            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ env: envState, leverage_buckets: leverageObj, restart: !!restart }),
          });
          if (!res.ok) throw new Error(`Save failed: HTTP ${res.status}`);
          const out = await res.json();
          setSettingsBaseline((prev) => ({ ...prev, env: { ...envState }, leverage: JSON.parse(JSON.stringify(leverageObj)) }));
          const msg = out.restart_requested

        setLeverageJson(text);

          return;
        }
        if (!parsed.value || typeof parsed.value !== "object" || Array.isArray(parsed.value)) {

          return;

        const validation = validateLeverage(parsed.value);

          return;

        setLeverageError("");

      function validateLeverage(obj) {
        if (!obj || typeof obj !== "object" || Array.isArray(obj)) return "Leverage config must be an object.";
        for (const key of Object.keys(obj)) {
          const val = obj[key];
          if (key === "default_leverage") {
            if (typeof val !== "number" || !Number.isFinite(val) || val <= 0) {
              return "default_leverage must be a positive number.";
            }
            continue;
          }
          if (!val || typeof val !== "object" || Array.isArray(val)) {
            return `Bucket '${key}' must be an object.`;
          }
          if (typeof val.leverage !== "number" || !Number.isFinite(val.leverage) || val.leverage <= 0) {
            return `Bucket '${key}' requires numeric leverage > 0.`;
          }
          if (!Array.isArray(val.symbols) || val.symbols.some((s) => typeof s !== "string")) {
            return `Bucket '${key}' requires symbols as string array.`;
          }
        }
        return "";
      }

              {
                title: "Other",
                keys: Object.keys(envState).filter((k) => !/^(BOT_MODE|ARIBOT_DB|ARIBOT_JSONL|INITIAL_BALANCE|ARIBOT_|ENTRY_RISK_PCT|ATR_VOLATILITY_CUTOFF|ATR_SIZE_SCALAR|DAILY_DRAWDOWN_LIMIT|MAX_CONSECUTIVE_LOSSES|COOLDOWN_CANDLES|RISK|ATR|REGIME|WMA|MAX_OPEN_POSITIONS|MAX_HOLD_MINUTES|POSITION|MAJOR_LEVERAGE|LARGE_ALT_LEVERAGE|MID_CAP_LEVERAGE|DEFAULT_LEVERAGE|ROUND_TRIP_FEE_RATE|SIZE|LEVERAGE|MIN_24H_VOLUME_QUOTE|MAX_TICK_AGE_SECONDS|MAX_UNCHANGED_TICK_CYCLES|MARKET|SYMBOL|PAIR|EXCHANGE|BYBIT|LOOP_INTERVAL_SECONDS|SIGNAL_BOUNDARY_WINDOW_SECONDS|PULSE_INTERVAL_SECONDS|LOOP_|POLL_|COOLDOWN|INTERVAL|CYCLE|RESTART_COMMAND|DASHBOARD_PORT|ALLOWED_ORIGIN|TELEGRAM|ALERT|API)/i.test(k)),
              },
            ].map((group) => h("div", { key: group.title, className: "group-block" }, [
              h("h4", { key: "t", className: "group-title" }, `${group.title} (${group.keys.length})`),
              group.keys.length ? h("div", { key: "grid", className: "field-grid" },
                group.keys.sort().map((k) => h("div", { key: k, className: "field" }, [
                  h("label", { key: "l", htmlFor: `env-${k}` }, k),
                  h("input", {
                    key: "i",
                    id: `env-${k}`,
                    value: envState[k] ?? "",
                    onChange: (e) => setEnvState((prev) => ({ ...prev, [k]: e.target.value })),
                  }),
                ]))
              ) : h("div", { key: "empty", className: "hint" }, "No fields in this group."),
            ])),

            h("div", { key: "levTitle", className: "section-title", style: { marginTop: "16px" } }, "Leverage Buckets"),
            h("div", { key: "levSplit", className: "split" }, [
              h("div", { key: "visual", className: "group-block" }, [
                h("div", { key: "subh", className: "section-title" }, [
                  h("span", null, "Visual Editor"),
                  h("button", {
                    className: "btn",
                    onClick: () => {
                      const name = prompt("New bucket name (e.g. small_cap):");
                      if (!name) return;
                      updateLeverageVisual((next) => {
                        if (!next[name]) {
                          next[name] = { leverage: Number(next.default_leverage || 1), symbols: [] };
                        }
                        return next;
                      });
                    },
                  }, "Add Bucket"),
                ]),

                h("div", { className: "field", style: { marginBottom: "8px" } }, [
                  h("label", null, "default_leverage"),
                  h("input", {
                    type: "number",
                    step: "0.1",
                    value: Number(leverageObj.default_leverage ?? 1),
                    onChange: (e) => updateLeverageVisual((next) => {
                      next.default_leverage = Number(e.target.value);
                      return next;
                    }),
                  }),
                ]),

                ...Object.keys(leverageObj)
                  .filter((k) => k !== "default_leverage")
                  .sort()
                  .map((bucket) => {
                    const row = leverageObj[bucket] || { leverage: 1, symbols: [] };
                    const symbolsCsv = Array.isArray(row.symbols) ? row.symbols.join(", ") : "";
                    return h("div", { key: bucket, className: "group-block" }, [
                      h("div", { className: "section-title" }, [
                        h("strong", null, bucket),
                        h("button", {
                          className: "btn danger",
                          onClick: () => updateLeverageVisual((next) => {
                            delete next[bucket];
                            return next;
                          }),
                        }, "Remove"),
                      ]),
                      h("div", { className: "field-grid" }, [
                        h("div", { className: "field" }, [
                          h("label", null, "Leverage"),
                          h("input", {
                            type: "number",
                            step: "0.1",
                            value: Number(row.leverage ?? 1),
                            onChange: (e) => updateLeverageVisual((next) => {
                              next[bucket].leverage = Number(e.target.value);
                              return next;
                            }),
                          }),
                        ]),
                        h("div", { className: "field" }, [
                          h("label", null, "Symbols (comma-separated)"),
                          h("input", {
                            value: symbolsCsv,
                            onChange: (e) => updateLeverageVisual((next) => {
                              next[bucket].symbols = e.target.value
                                .split(",")
                                .map((s) => s.trim())
                                .filter(Boolean);
                              return next;
                            }),
                          }),
                        ]),
                      ]),
                    ]);
                  }),
              ]),

              h("div", { key: "json", className: "group-block" }, [
                h("div", { className: "section-title" }, "JSON Editor"),
                h("div", { className: "field" }, [
                  h("label", null, "Leverage JSON"),
                  h("textarea", {
                    value: leverageJson,
                    onChange: (e) => onLeverageJsonChange(e.target.value),
                  }),
                ]),
                leverageError ? h("div", { className: "error-banner", style: { marginTop: "8px" } }, leverageError) : h("div", { className: "hint" }, "Visual and JSON views stay synchronized when valid."),
              ]),
            ]),

            h("div", { key: "actions", className: "footer-actions", style: { marginTop: "12px" } }, [
              h("button", { className: "btn", disabled: settingsSaving || !settingsLoaded, onClick: () => loadSettings() }, "Reload"),
              h("button", { className: "btn primary", disabled: !canSave, onClick: () => saveSettings(false) }, settingsSaving ? "Saving..." : "Save"),
              canSaveRestart ? h("button", { className: "btn warning", disabled: !canSaveRestart, onClick: () => saveSettings(true) }, "Save & Restart") : null,
            ]),
          ]) : null,
        ]) : null,

        closeSymbolTarget ? h(Modal, {
          key: "m-close-symbol",
          title: `Close ${closeSymbolTarget}?`,
          onClose: () => setCloseSymbolTarget(null),
          actions: [
            h("button", { key: "c", className: "btn", onClick: () => setCloseSymbolTarget(null) }, "Cancel"),
            h("button", {
              key: "ok",
              className: "btn danger",
              onClick: async () => {
                const symbol = closeSymbolTarget;
                setCloseSymbolTarget(null);
                if (symbol) await doControl("close_symbol", symbol);
              },
            }, "Confirm Close"),
          ],
        }, h("p", null, `Close ${closeSymbolTarget}? This will post a close request to the bot.`)) : null,

        showCloseAllModal ? h(Modal, {
          key: "m-close-all",
          title: "Confirm Close All",
          onClose: () => setShowCloseAllModal(false),
          actions: [
            h("button", { key: "c", className: "btn", onClick: () => setShowCloseAllModal(false) }, "Cancel"),
            h("button", {
              key: "ok",
              className: "btn danger",
              onClick: async () => {
                setShowCloseAllModal(false);
                await doControl("close_all");
              },
            }, "Confirm Close All"),
          ],
        }, h("p", null, "This queues a close-all confirmation for every open position.")) : null,

        showKillStepOne ? h(Modal, {
          key: "m-kill-1",
          title: "Kill Switch - Step 1",
          onClose: () => setShowKillStepOne(false),
          actions: [
            h("button", { key: "c", className: "btn", onClick: () => setShowKillStepOne(false) }, "Cancel"),
            h("button", {
              key: "next",
              className: "btn danger",
              onClick: () => {
                setShowKillStepOne(false);
                setShowKillStepTwo(true);
              },
            }, "Continue"),
          ],
        }, h("p", null, "This action is high-impact. Proceed to typed confirmation.")) : null,

        showKillStepTwo ? h(Modal, {
          key: "m-kill-2",
          title: "Kill Switch - Step 2",
          onClose: () => {
            setShowKillStepTwo(false);
            setKillInput("");
          },
          actions: [
            h("button", {
              key: "c",
              className: "btn",
              onClick: () => {
                setShowKillStepTwo(false);
                setKillInput("");
              },
            }, "Cancel"),
            h("button", {
              key: "k",
              className: "btn danger",
              disabled: killInput !== "CONFIRM KILL",
              onClick: async () => {
                setShowKillStepTwo(false);
                setKillInput("");
                await doControl("kill");
              },
            }, "Execute Kill"),
          ],
        }, h(React.Fragment, null, [
          h("p", { key: "p1" }, "Type CONFIRM KILL exactly to enable execution."),
          h("input", {
            key: "inp",
            className: "field",
            style: { width: "100%", border: "1px solid var(--border)", borderRadius: "8px", padding: "8px", background: "var(--surface)", color: "var(--text)" },
            value: killInput,
            onChange: (e) => setKillInput(e.target.value),
            placeholder: "CONFIRM KILL",
          }),
        ])) : null,
      ]);
    }

    createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
