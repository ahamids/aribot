<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Aribot sticker icon: coral tile with plum outline (the signature
       sticker-shadow aesthetic) + a stylized lowercase 'a' rendered as
       two simple paths so it's font-independent across browsers.
       Colors match the design tokens in app/globals.css:
         coral  #ff8b66
         plum   #2d1f47
    -->
  <rect x="2" y="2" width="28" height="28" rx="7"
        fill="#ff8b66" stroke="#2d1f47" stroke-width="2.5"/>
  <!-- "a" bowl: ring on the left -->
  <circle cx="13" cy="19" r="5"
          fill="none" stroke="#2d1f47" stroke-width="3"/>
  <!-- "a" stem: vertical bar on the right -->
  <rect x="18" y="10" width="3.5" height="14" rx="1.5"
        fill="#2d1f47"/>
</svg>
